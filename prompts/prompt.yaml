
constants:
  embeddings:
    type: integer
    value: &EMB_DIMS 1024
  embedding_model:
    type: URL
    value: &EMB_MODEL "https://huggingface.co/Qwen/Qwen3-Embedding-0.6B"

specification:
  name: Joke Database Creator and Ingester scripts
  description: <
    LLM prompt for tasks to create a database of jokes, along with the necessary infrastructure for db creation and maintenance, plus a module+ingester script for loading new jokes into the database and generating LLM embeddings
  features:
    - a sqlalchemy database schema definition script
    - a sqlalchemy database initialization script
    - alembic installation and migration instructions
    - joke ingestion module, which loads text jokes into the database and generates embeddings for the joke text
  tasks:
    schemas:
      description: generate a database table(s) schema definition python script
      format: python 3.10+ sqlalchemy table definitions
      filename: db/models.py
      assumptions:
        - postgresql 16.14
          - pgvector installed
        - SQLAlchemy 2.0.50
      schemas:
        joke:
          description: a table to store joke texts and LLM semantic embeddings
          fields:
            uuid:
              type: UUID
              description: unique ID for this joke row
            content:
              type: TEXT
              description: text of the joke
            embed:
              type: VECTOR(*EMB_DIMS)
              description: pgvector embedding vector for the given joke text
              default: NULL
            added:
              type: TIMESTAMP
              description: date the row was added to table
              default: now
            modified:
              type: TIMESTAMP
              description: date the row was modified
              default: now

        media:
          description: table storing paths to joke-related media such as audio files
          fields:
            uuid:
              type: UUID
              description: unique ID for a given media
            joke_uuid:
              type: UUID
              description: UUID, foreign key linking to joke.uuid
            hash:
              type:
              description: hex text of the SHA256 hash of the media file's content
              default: NULL
            path:
              type: TEXT
              description: platform-appropriate pathname to the media file
              default: NULL
            added:
              type: TIMESTAMP
              description: date the row was added to table
              default: now
            modified:
              type: TIMESTAMP
              description: date the row was modified
              default: now

    sqlalchemy_init_script:
      description: generate the sqlalchemy script to initialize the database, and produce a database connection
      filename: db/database.py

    setup_alembic:
      description: install, configure and initialize Alembic
      mode: provide instructions for human

    add_pyproject_dependencies:
      description: add all pypi module dependencies to pyproject.toml that are needed for this project via `uv add <module>`
      mode: agent

    ingestion_script:
      description: generate a Python 3.10+ module script that provides a Python functional interface for adding new joke texts to the database, plus a CLI argparse interface that lets the user specify a file of jokes to load.
      filename: src/joke_reader/ingester.py
      specifications:
        insert_joke: function that uses the SQLAlchemy-based ORM interface defined above to insert a joke text into the database, after first stripping the text of white space and quotation characters from the text's start and end
        insert_jokes: function that accepts a filename of text jokes, opens, interates, hands each line to insert_joke
        get_args:
          description: argparse definition, providing the following options
          options:
            pathname: optional path to a text file of jokes, which will be passed to insert_jokes
            joke: optional positional value of a text string supplied on the commandline, which will be passed to insert_joke
        main:
          description: calls get_args, and invokes either insert_joke or insert_jokes based on options supplied
        module: module-level handling for `if __name__ == "__main__" ... main()` etc

    kokoro_encoder_script:
      description: generate a python 3.10+ module script that produces audio files, generated by Kokoro
      filename: src/joke_reader/encode_jokes.py
      specifications:
        query: select rows from table joke where there is no corresponding media row yet (left outer join where media.joke_uuid IS NULL)
        per_row:
          - insert a row for the joke into table media, with hash and path set to NULL; this serves to indicate to other processes that that media row is in process
          - encode the media using KokoroTTSWriter.write_to_hashpath from src/joke_reader/encode_jokes.py, collecting the output path and digest from the call
          - update the corresponding media row with path and digest

    embedding_generator_script:
      description: generate a python 3.10+ module that calculates a semantic LLM embedding vector, and adds it to table jokes
      filename: src/joke_reader/make_embeddings.py
      specifications:
        query: select rows from table joke where joke.embed IS NULL
        per_row:
          - iterate search result rows
          - generate an embedding vector of `joke.content` using *EMB_MODEL
            - make use of the 'Transformers Usage' code (at https://huggingface.co/Qwen/Qwen3-Embedding-0.6B#transformers-usage)
          - update corresponding joke row with embedding vector
